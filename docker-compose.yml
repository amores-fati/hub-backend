services:
  api:
    build:
      context: .
      target: development
    init: true
    env_file:
      - .env
    # Runs migrations, executes the idempotent development seed and then starts Nest in watch mode.
    command: ['npm', 'run', 'start:docker:dev']
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      DB_HOST: postgres
      DB_PORT: 5432
      DB_TEST_HOST: postgres-test
      DB_TEST_PORT: 5432
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    volumes:
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      postgres-test:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_DATABASE:-api_db}
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_TEST_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_TEST_PASSWORD:-secret}
      POSTGRES_DB: ${DB_TEST_DATABASE:-api_db_test}
    ports:
      - '${DB_TEST_PORT:-5433}:5432'
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres-e2e:
    image: postgres:16-alpine
    profiles: ['e2e']
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: api_db_e2e
    ports:
      - '5436:5432'
    volumes:
      - pgdata_e2e:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  node_modules:
  pgdata:
  pgdata_test:
  pgdata_e2e:
